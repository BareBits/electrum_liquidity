name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Electrum tag the plugin is developed against. The glue/Qt tests import from a
# real Electrum, so CI checks out this exact tag and symlinks the plugin into it.
env:
  ELECTRUM_REF: '4.7.2'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Qt offscreen system libs
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libglib2.0-0

      - name: Clone Electrum ${{ env.ELECTRUM_REF }}
        run: git clone --depth 1 --branch "${ELECTRUM_REF}" https://github.com/spesmilo/electrum.git electrum-src

      - name: Install Electrum (editable) + test deps
        # Editable so `import electrum` resolves to ./electrum-src, where we
        # symlink the plugin below. A non-editable install would import from
        # site-packages and never see the plugin.
        run: |
          python -m pip install --upgrade pip
          pip install -e ./electrum-src
          pip install cryptography PyQt6 pytest

      - name: Symlink plugin into Electrum's plugins dir
        run: ln -s "${GITHUB_WORKSPACE}/inbound_liquidity" electrum-src/electrum/plugins/inbound_liquidity

      - name: Verify plugin imports (fail, don't silently skip)
        # The glue tests use pytest.importorskip on this module; if the import
        # breaks they would skip and the suite would go green on the engine
        # tests alone. Import it directly here so a real breakage fails CI.
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -c "import electrum.plugins.inbound_liquidity; print('plugin import OK')"
          python -c "import electrum.gui.qt.util; print('electrum qt import OK')"

      - name: Run tests (offscreen Qt)
        env:
          QT_QPA_PLATFORM: offscreen
        # -rs prints the reason for any skip, so a silently-skipped glue module
        # is visible in the log (the verify step above already hard-fails on the
        # import error that would cause such a skip).
        run: python -m pytest tests -q -rs

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read plugin version
        id: meta
        run: |
          version="$(python3 -c 'import json; print(json.load(open("inbound_liquidity/manifest.json"))["version"])')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "zip=inbound_liquidity-${version}.zip" >> "$GITHUB_OUTPUT"

      - name: Build plugin zip
        run: |
          # Package only the importable plugin package, excluding caches.
          zip -r "${{ steps.meta.outputs.zip }}" inbound_liquidity \
            -x '*/__pycache__/*' '*.pyc' '*/.pytest_cache/*'
          echo "----- zip contents -----"
          unzip -l "${{ steps.meta.outputs.zip }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.zip }}
          path: ${{ steps.meta.outputs.zip }}
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "${{ steps.meta.outputs.zip }}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --notes "Inbound Liquidity Manager plugin v${{ steps.meta.outputs.version }}. **Experimental — do not use with real funds.** Install by importing the attached zip into Electrum's plugin manager."
