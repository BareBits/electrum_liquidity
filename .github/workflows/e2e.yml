name: e2e (regtest rig)

# Opt-in only: the end-to-end rig needs bitcoind + Fulcrum + Docker and takes
# several minutes per test, so it is NOT part of the pull-request CI. Trigger it
# by hand from the Actions tab (Run workflow).
#
# NOTE: this job is best-effort and was authored without a live GitHub-Actions
# run to validate it end-to-end -- the pinned Bitcoin Core / Fulcrum download
# URLs and versions may need adjusting on first run. It mirrors the local
# invocation documented in e2e/README.md.
on:
  workflow_dispatch:
    inputs:
      pytest_args:
        description: 'pytest args (e.g. a single test file under e2e/tests)'
        required: false
        default: 'e2e/tests'

# Electrum tag the plugin (and rig) are developed against.
env:
  ELECTRUM_REF: '4.7.2'
  BITCOIN_VERSION: '27.1'
  FULCRUM_VERSION: '2.1.1'

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: System libs (Qt offscreen + Fulcrum runtime)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libglib2.0-0

      - name: Install Bitcoin Core ${{ env.BITCOIN_VERSION }}
        run: |
          set -eux
          url="https://bitcoincore.org/bin/bitcoin-core-${BITCOIN_VERSION}/bitcoin-${BITCOIN_VERSION}-x86_64-linux-gnu.tar.gz"
          curl -fsSL "$url" -o /tmp/bitcoin.tar.gz
          tar -xzf /tmp/bitcoin.tar.gz -C /tmp
          sudo install -m 0755 "/tmp/bitcoin-${BITCOIN_VERSION}/bin/bitcoind"    /usr/local/bin/bitcoind
          sudo install -m 0755 "/tmp/bitcoin-${BITCOIN_VERSION}/bin/bitcoin-cli" /usr/local/bin/bitcoin-cli
          bitcoind --version | head -1

      - name: Install Fulcrum ${{ env.FULCRUM_VERSION }}
        run: |
          set -eux
          url="https://github.com/cculianu/Fulcrum/releases/download/v${FULCRUM_VERSION}/Fulcrum-${FULCRUM_VERSION}-x86_64-linux.tar.gz"
          curl -fsSL "$url" -o /tmp/fulcrum.tar.gz
          tar -xzf /tmp/fulcrum.tar.gz -C /tmp
          mkdir -p e2e/bin
          cp "/tmp/Fulcrum-${FULCRUM_VERSION}-x86_64-linux/Fulcrum" e2e/bin/Fulcrum
          chmod +x e2e/bin/Fulcrum
          e2e/bin/Fulcrum --version 2>&1 | head -1

      - name: Build rig (Electrum checkout + venv + nostr image)
        working-directory: e2e
        run: ./setup.sh

      - name: Run e2e suite (headless)
        env:
          RUN_RIG_E2E: '1'
          QT_QPA_PLATFORM: offscreen
        run: e2e/.venv-electrum/bin/python -m pytest ${{ github.event.inputs.pytest_args }} -q -s
